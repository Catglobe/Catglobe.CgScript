name: Release Catglobe.ScriptDeployer NuPkg
on:
  workflow_dispatch:
  push:
    branches:
    - main
    - next

permissions:
  contents: read
  packages: write

jobs:
  build-vs-extension:
    name: Build VS Extension
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4
      - name: Setup .NET
        uses: actions/setup-dotnet@3e891b0cb619bf60e2c25674b222b8940e2c1c25 # v4
        with:
          dotnet-version: '10'
      - name: Build Visual Studio extension
        run: dotnet build Catglobe.CgScript.EditorSupport.VisualStudio -c Release
      - name: Locate and stage vsix
        run: |
          $vsix = Get-ChildItem Catglobe.CgScript.EditorSupport.VisualStudio\bin\Release -Recurse -Filter *.vsix | Select-Object -First 1
          if (-not $vsix) { Write-Error "ERROR: no vsix produced"; exit 1 }
          Copy-Item $vsix.FullName vs-extension.vsix
          Write-Host "Staged $($vsix.FullName) -> vs-extension.vsix"
        shell: pwsh
      - name: Upload VS extension artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: vs-extension
          path: vs-extension.vsix
          retention-days: 1

  release:
    name: Build and Release
    runs-on: ubuntu-latest
    needs: build-vs-extension
    permissions:
      contents: write
      issues: write
      packages: write
      pull-requests: write
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4
      - name: Setup .NET
        uses: actions/setup-dotnet@3e891b0cb619bf60e2c25674b222b8940e2c1c25 # v4
        with:
          dotnet-version: '10'
      - name: Setup Node.js
        uses: actions/setup-node@39370e3970a6d050c480ffad4ff0ed4d3fdee5af # v4
        with:
          cache: npm
          cache-dependency-path: package-lock.json
          node-version: 'lts/*'
      - name: Download VS extension artifact
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          name: vs-extension
      - name: Publish LSP server
        run: dotnet publish Catglobe.CgScript.EditorSupport.Lsp.Server -c Release -o Catglobe.CgScript.EditorSupport.VsCode/server
      - name: Compile VS Code extension
        working-directory: Catglobe.CgScript.EditorSupport.VsCode
        run: |
          cp ../LICENSE .
          npm clean-install
          npm run compile
      - name: Install dependencies
        run: npm clean-install
      - name: NuGet login (OIDC → temp API key)
        uses: NuGet/login@d22cc5f58ff5b88bf9bd452535b4335137e24544 # v1
        id: nuget
        with:
          user: Catglobe
      - name: Release
        run: npx semantic-release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NUGET_TOKEN: ${{steps.nuget.outputs.NUGET_API_KEY}}
